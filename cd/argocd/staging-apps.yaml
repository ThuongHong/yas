# ArgoCD Applications for the STAGING environment (sub-project E).
# Tracks the `main` branch and deploys the rolling `:latest` image
# (thuonghong/yas-backoffice-bff:latest, published by the CI main-branch build). Sync is
# MANUAL (no automated block) so staging is promoted deliberately. Shares infra with
# dev/yas (cross-namespace FQDNs).
#
# We track main/:latest instead of a git tag: main and latest point at the same commit,
# so a separate vX.Y.Z tag build is redundant for this demo. backoffice-bff is the
# release-bearing service (product/storefront-bff are omitted).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-yas-configuration
  namespace: argocd
spec:
  project: yas-cd
  source:
    repoURL: https://github.com/ThuongHong/yas.git
    targetRevision: main
    path: k8s/charts/yas-configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions: [CreateNamespace=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-backoffice-bff
  namespace: argocd
spec:
  project: yas-cd
  source:
    repoURL: https://github.com/ThuongHong/yas.git
    targetRevision: main
    path: k8s/charts/backoffice-bff
    helm:
      values: |
        backend:
          replicaCount: 1
          serviceMonitor:
            enabled: false
          image:
            repository: thuonghong/yas-backoffice-bff
            tag: latest
          resources:
            requests: { cpu: 50m, memory: 384Mi }
            limits: { memory: 768Mi }
          extraEnvs:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: UI_HOST
              value: http://backoffice-ui:3000
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx320m -Xms128m"
          ingress:
            host: backoffice.staging.yas.local.com
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions: [CreateNamespace=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-storefront-ui
  namespace: argocd
spec:
  project: yas-cd
  source:
    repoURL: https://github.com/ThuongHong/yas.git
    targetRevision: main
    path: k8s/charts/storefront-ui
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions: [CreateNamespace=true]
