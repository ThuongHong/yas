# Sub-project F — retry policy for the tax service.
# Callers of `tax` (e.g. order during checkout) get up to 3 attempts on 5xx / gateway /
# connection errors, demonstrating resilience via the mesh without any app code change.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: tax-retry
  namespace: yas
spec:
  hosts:
    - tax            # in-mesh short name (tax.yas.svc.cluster.local)
  http:
    - route:
        - destination:
            host: tax
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,gateway-error,connect-failure,reset
