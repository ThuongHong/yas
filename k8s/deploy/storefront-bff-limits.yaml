# storefront-bff: RAM caps. Re-lists chart extraEnvs (UI_HOST, prod profile) because
# Helm REPLACES list values -> generic subset-limits.yaml would clobber them.
backend:
  replicaCount: 1
  serviceMonitor:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      memory: 768Mi
  extraEnvs:
    - name: SPRING_PROFILES_ACTIVE
      value: prod
    - name: UI_HOST
      value: http://storefront-ui:3000
    - name: JAVA_TOOL_OPTIONS
      value: "-Xmx320m -Xms128m"
