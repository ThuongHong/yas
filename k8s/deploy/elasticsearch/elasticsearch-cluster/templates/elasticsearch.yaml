apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
spec:
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  # Must match the Elasticsearch Java client major shipped by Spring Boot 4 (9.x).
  # Server 8.8.1 + client 9.x returns 400 on indices.exists and breaks the search service.
  version: 9.0.4
  auth:
    fileRealm:
      - secretName: user-credentials-secret
  nodeSets:
    - name: node
      count: {{ .Values.elasticsearch.replicas }}
      config:
        node.store.allow_mmap: false
